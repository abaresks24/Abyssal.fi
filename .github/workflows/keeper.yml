name: Keeper Cron (disabled — using cron-job.org instead)

# Schedule removed — GitHub Actions free-tier scheduling is unreliable
# (1-2h delays observed). Replaced by cron-job.org pinging every 1 min.
# Kept here for manual dispatch + reference.

on:
  workflow_dispatch:  # manual trigger only

permissions:
  contents: read

jobs:
  keeper:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Settle expired options
        run: |
          curl -sS -w "\nHTTP %{http_code} (%{time_total}s)\n" \
            -X POST "https://abyssal-fi.vercel.app/api/keeper/settle" \
            -H "Content-Type: application/json" \
            -d '{}' || true

      - name: Hedge delta exposure
        run: |
          curl -sS -w "\nHTTP %{http_code} (%{time_total}s)\n" \
            -X POST "https://abyssal-fi.vercel.app/api/keeper/hedge" \
            -H "Content-Type: application/json" \
            -d '{}' || true
